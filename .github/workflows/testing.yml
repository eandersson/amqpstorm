name: Testing

on:
  push:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 13 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11.15, 3.12.13, 3.13.12, 3.14.3, 3.14t]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f test-requirements.txt ]; then pip install -r test-requirements.txt; fi
      - name: Start RabbitMQ
        run: |
          docker build -t amqpstormdev ./docker/
          docker run -d --hostname rmq.eandersson.net --name amqpstormdev -p 5671:5671 -p 5672:5672 -p 15671:15671 -p 15672:15672 amqpstormdev
          docker cp amqpstormdev:/etc/rabbitmq/ssl/ ./amqpstorm/tests/resources/
          docker exec amqpstormdev wait-for-rabbitmq
          echo "RabbitMQ Version: $(docker exec amqpstormdev rabbitmqctl --version)"
          docker exec amqpstormdev rabbitmqctl add_user 'amqpstorm' '2a55f70a841f18b'
          docker exec amqpstormdev rabbitmqctl -p / set_permissions 'amqpstorm' '.*' '.*' '.*'
          docker exec amqpstormdev rabbitmqctl set_user_tags amqpstorm administrator
          nc -zv rmq.eandersson.net 5671  || exit 1
          nc -zv rmq.eandersson.net 5672  || exit 1
          nc -zv rmq.eandersson.net 15671 || exit 1
          nc -zv rmq.eandersson.net 15672 || exit 1
      - name: Lint with flake8
        run: |
          flake8 .
      - name: Test with pytest
        run: |
          pytest

  lavinmq:
    name: LavinMQ end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f test-requirements.txt ]; then pip install -r test-requirements.txt; fi
      - name: Build and start LavinMQ
        run: |
          docker build -t amqpstorm-lavinmq -f docker/Dockerfile.lavinmq docker/
          docker run -d --hostname rmq.eandersson.net --name lavinmq \
            -p 5672:5672 -p 5671:5671 -p 15672:15672 amqpstorm-lavinmq
          docker cp lavinmq:/etc/rabbitmq/ssl/ ./amqpstorm/tests/resources/
          echo "Waiting for LavinMQ to become ready..."
          for _ in $(seq 1 30); do
            if curl -sf -u guest:guest http://localhost:15672/api/overview >/dev/null; then
              echo "LavinMQ is ready"
              break
            fi
            sleep 2
          done
          curl -sf -u guest:guest http://localhost:15672/api/overview \
            || { echo "LavinMQ did not become ready"; docker logs lavinmq; exit 1; }
      - name: Run functional tests against LavinMQ
        env:
          AMQP_BROKER: lavinmq
          AMQP_USERNAME: guest
          AMQP_PASSWORD: guest
          AMQP_URI: amqp://guest:guest@rmq.eandersson.net:5672/%2F
          AMQP_SSL_URI: amqps://guest:guest@rmq.eandersson.net:5671/%2F
        run: |
          pytest amqpstorm/tests/functional
      - name: LavinMQ logs
        if: failure()
        run: docker logs lavinmq 2>&1 | tail -80
